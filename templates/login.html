<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MediPredict</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css', v='4') }}">
</head>
<body>
    <main class="login-main">
        <section class="login-card">
            <span class="mark"></span>
            <h1>Welcome back</h1>
            <p class="muted">Access saved reports, consultations, and prediction history.</p>

            <form action="{{ url_for('home') }}" method="GET">
                <input type="email" placeholder="you@example.com" required>
                <input type="password" placeholder="password" required>
                <button type="submit" class="btn btn-primary">Login</button>
            </form>
        </section>
    </main>
    <script src="{{ url_for('static', filename='app.js', v='2') }}"></script>
</body>
</html>
